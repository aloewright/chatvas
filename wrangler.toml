name = "chatvas-api"
main = "src/worker/index.js"
compatibility_date = "2026-03-31"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[observability]
enabled = true

# Short-lived auth handoff codes (nonce → one-time code from cloudos-auth)
[[kv_namespaces]]
binding = "AUTH_HANDOFF"
id = "e81862bdafce48b7ae4439fd66b3ed99"
preview_id = "cbf47d5de1aa47e3b39dec546008a2ca"

# User/canvas/media metadata
[[d1_databases]]
binding = "DB"
database_name = "chatvas-db"
database_id = "be40dc9b-985a-4312-af19-4bfa768a6c77"
preview_database_id = "02f0ab5b-f2bc-40a2-a0c1-7158ea9f973d"

# Media storage (images, PDFs, videos)
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "chatvas-media"
preview_bucket_name = "chatvas-media-preview"

# Semantic search
[[vectorize]]
binding = "VECTORIZE"
index_name = "chatvas-embeddings"

# Durable Object for per-canvas state
[[durable_objects.bindings]]
name = "CANVAS_CONTAINER"
class_name = "CanvasContainer"

[[migrations]]
tag = "v1"
new_classes = ["CanvasContainer"]

# AI Gateway for model calls
[ai]
binding = "AI"

# auth.pdx.software base URL for the /native/exchange call
[vars]
AUTH_BASE = "https://auth.pdx.software"
